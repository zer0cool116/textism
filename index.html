<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/gif" href="TextismIcon.gif">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text-ism</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Electrolize&family=Jolly+Lodger&family=Amatic+SC:wght@400;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Press+Start+2P&family=Pixelify+Sans:wght@400;700&family=Tiny5&family=Doto&family=Jacquard+12&family=DynaPuff:wght@400;600&family=Chewy&family=Cherry+Bomb+One&display=swap" rel="stylesheet"> 
<style>
  :root {
    --bg: #0e0e0e;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #e8e4dc;
    --text2: #888880;
    --text3: #444440;
    --accent-pt: #7ecfb3;
    --accent-np: #d4607a;
    --accent-pt-dim: rgba(126,207,179,0.12);
    --accent-np-dim: rgba(212,96,122,0.12);
    --f-rock: 'Rockwell', 'Rockwell Nova', serif;
    --f-rockc: 'Rockwell Condensed', 'Rockwell Nova Condensed', serif;
    --f-elec: 'Electrolize', sans-serif;
    --f-jolly: 'Jolly Lodger', cursive;
    --f-amatic: 'Amatic SC', cursive;
    --f-cnew: 'Courier New', monospace;
    --f-cprime: 'Courier Prime', monospace;
    --f-press: 'Press Start 2P', monospace;
    --accent-inf: #f0d060;
    --accent-inf-dim: rgba(240, 208, 96, 0.12);
  }
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--f-rock);
    min-height: 100vh;
    padding: 0 0 4rem;
  }
 
  header {
    padding: 3rem 1.5rem 2rem;
    text-align: center;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 2rem;
  }
 
  .site-title {
    display: inline-flex;
    align-items: baseline;
    gap: 0;
    line-height: 1;
  }
 
  .title-left {
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 700;
    color: var(--text);
    transition: font-family 1.4s ease;
    font-family: var(--f-rock);
  }
 
  .title-dash {
    font-size: clamp(2.8rem, 8vw, 5rem);
    color: var(--text3);
    font-family: var(--f-rock);
    font-weight: 400;
  }
 
  .title-right {
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 400;
    color: var(--text2);
    transition: font-family 1.4s ease;
    font-family: var(--f-elec);
  }
 
  .subtitle {
    font-family: var(--f-cprime);
    font-size: 0.8rem;
    color: var(--text3);
    letter-spacing: 0.18em;
    margin-top: 0.6rem;
    text-transform: lowercase;
  }
 
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 1.25rem;
  }
 
  .input-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 2rem;
  }
 
  #word-input {
    flex: 1;
    background: var(--bg2);
    border: 0.5px solid var(--border-hover);
    color: var(--text);
    font-family: var(--f-rock);
    font-size: 1.1rem;
    padding: 10px 14px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }
  #word-input:focus { border-color: rgba(255,255,255,0.35); }
  #word-input::placeholder { color: var(--text3); }
 
  .btn-clear {
    background: transparent;
    border: 0.5px solid var(--border-hover);
    color: var(--text2);
    font-family: var(--f-cprime);
    font-size: 0.8rem;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s, color 0.15s;
  }
  .btn-clear:hover { background: var(--bg3); color: var(--text); }
 
  .sec-label {
    font-family: var(--f-elec);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sec-label::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }
 
  .font-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 6px;
    margin-bottom: 2rem;
  }
 
  .font-btn {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    line-height: 1.35;
  }
  .font-btn:hover { border-color: var(--border-hover); background: var(--bg3); }
  .font-btn.active { border-color: rgba(255,255,255,0.4); background: var(--bg3); }
  .font-btn .fname { font-size: 1rem; display: block; }
  .font-btn .ftag { font-size: 0.65rem; color: var(--text3); font-family: var(--f-elec); letter-spacing: 0.06em; display: block; margin-top: 3px; }
 
  .effect-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 6px;
    margin-bottom: 2rem;
  }
 
  .eff-btn {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    font-family: var(--f-cprime);
    font-size: 0.85rem;
    transition: border-color 0.15s, background 0.15s;
    line-height: 1.3;
  }
  .eff-btn .etag {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .eff-btn:hover { border-color: var(--border-hover); background: var(--bg3); }
  .eff-btn.active { background: var(--bg3); border-color: rgba(255,255,255,0.4); }
  .eff-btn.pt { border-left: 2px solid var(--accent-pt); }
  .eff-btn.pt .etag { color: var(--accent-pt); }
  .eff-btn.pt.active { background: var(--accent-pt-dim); border-color: var(--accent-pt); }
  .eff-btn.np { border-left: 2px solid var(--accent-np); }
  .eff-btn.np .etag { color: var(--accent-np); }
  .eff-btn.np.active { background: var(--accent-np-dim); border-color: var(--accent-np); }
 
  .preview-wrap {
    min-height: 120px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    margin-bottom: 1rem;
    overflow: hidden;
  }
 
  #preview-word {
    font-size: 2.2rem;
    display: inline-block;
    color: var(--text);
    font-family: var(--f-rock);
    max-width: 100%;
    word-break: break-all;
    text-align: center;
  }
 
  .btn-add {
    width: 100%;
    padding: 11px;
    background: transparent;
    border: 0.5px solid var(--border-hover);
    color: var(--text2);
    font-family: var(--f-elec);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 2.5rem;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn-add:hover { background: var(--bg3); color: var(--text); border-color: rgba(255,255,255,0.3); }
  .btn-add:active { opacity: 0.7; }
 
  .divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 0 0 2rem;
  }
 
  .lb-list { display: flex; flex-direction: column; gap: 8px; }
 
  .lb-empty {
    font-family: var(--f-cprime);
    font-size: 0.85rem;
    color: var(--text3);
    font-style: italic;
  }
 
  .lb-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    min-height: 64px;
    overflow: visible;
  }
 
  .lb-rank {
    font-family: var(--f-elec);
    font-size: 0.7rem;
    color: var(--text3);
    min-width: 24px;
    flex-shrink: 0;
  }
 
  .lb-center {
    flex: 1;
    overflow: hidden;
    min-width: 0;
    padding: 8px 0;
  }
 
  .lb-rendered {
    display: block;
    font-size: 1.3rem;
    color: var(--text);
    font-family: var(--f-rock);
    white-space: nowrap;
    max-width: 100%;
    line-height: 1.6;
    transform-origin: left center;
  }
 
  .lb-meta {
    font-family: var(--f-elec);
    font-size: 0.6rem;
    color: var(--text3);
    letter-spacing: 0.06em;
    margin-top: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
 
  .lb-chars {
    font-family: var(--f-elec);
    font-size: 0.7rem;
    color: var(--text3);
    white-space: nowrap;
  }
 
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 0.5px solid var(--border-hover);
    color: var(--text);
    font-family: var(--f-elec);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 10px 20px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

 .infini-pack {
  margin-top: -1rem;
  margin-bottom: 2rem;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 8px;
  font-family: var(--f-cprime);
  font-size: 0.65rem;
  color: var(--text3);
}

.infini-pack img {
  height: 31px;
  image-rendering: pixelated;
  opacity: 0.85;
  transition: transform 0.15s ease, opacity 0.15s ease;
}

.infini-pack img:hover {
  transform: scale(1.1);
  opacity: 1;
}
/* infini font buttons get a yellow left border */
#infini-font-grid .font-btn {
  border-left: 2px solid var(--accent-inf);
}
#infini-font-grid .font-btn.active {
  background: var(--accent-inf-dim);
  border-color: var(--accent-inf);
}

#infini-label {
  color: var(--accent-inf);
}

.new-tag {
  position: absolute;
  top: -6px;
  right: -6px;
  background: #ff4d6d;
  color: white;
  font-size: 0.55rem;
  padding: 2px 5px;
  border-radius: 6px;
  font-weight: bold;
  letter-spacing: 0.05em;
  pointer-events: none;
}

.eff-btn {
  position: relative;
}
  
</style>
</head>
<body>
 
<header>
  <div class="site-title">
    <span class="title-left" id="tl">Text</span>
    <span class="title-dash">-</span>
    <span class="title-right" id="tr">ism</span>
  </div>
  <p class="subtitle">a writing effects playground</p>
</header>
 
<div class="container">
  <div class="input-wrap">
    <input type="text" id="word-input" placeholder="type a word…" maxlength="80" autocomplete="off" spellcheck="false" />
    <button class="btn-clear" id="btn-clear">clear all</button>
  </div>
 
  <div class="sec-label">font</div>
  <div class="font-grid" id="font-grid"></div>
 
  <div class="sec-label">basic effects</div>
  <div class="effect-grid" id="basic-grid"></div>
 
  <div class="sec-label">PowerTrip: TecHJuNKiE effects</div>
  <div class="effect-grid" id="pt-grid"></div>
 
  <div class="sec-label">Neighbourhood Paranoia effects</div>
  <div class="effect-grid" id="np-grid"></div>

<div class="sec-label" id="infini-label">Infini-Spired Pack</div>
<div class="font-grid" id="infini-font-grid"></div>

<div class="infini-pack">
  <span>inspired by</span>
  <a href="https://infini.gay" target="_blank">
    <img src="https://infini.gay/images/infinibutton.gif" alt="infini site button">
  </a>
</div>
 
  <div class="preview-wrap">
    <span id="preview-word">your word</span>
  </div>
 
  <button class="btn-add" id="btn-add">+ add to leaderboard</button>
 
  <hr class="divider">
 
  <div class="sec-label">leaderboard — longest words</div>
  <div class="lb-list" id="lb-list">
    <div class="lb-empty">loading…</div>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, query, orderByChild, limitToLast, onValue } 
from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

/* ── FIREBASE ── */
const app = initializeApp({
  apiKey: 'AIzaSyCP3EQbwFp_htub5fureD2xSq1XEJeiqXg',
  authDomain: 'zerpleneo.firebaseapp.com',
  databaseURL: 'https://zerpleneo-default-rtdb.firebaseio.com',
  projectId: 'zerpleneo',
  appId: '1:571530609364:web:1265acc2ebff4d03e6f141',
});
const db = getDatabase(app);

/* ── FONTS ── */
const fonts = [
  { name: 'Rockwell', css: "'Rockwell','Rockwell Nova',serif", tag: 'serif' },
  { name: 'Electrolize', css: "'Electrolize',sans-serif", tag: 'google' },
  { name: 'Jolly Lodger', css: "'Jolly Lodger',cursive", tag: 'display' },
];

/* ── EFFECTS ── */
const basicEffects = [
  { name: 'bold', apply: el => el.style.fontWeight = '700' },
  { name: 'italic', apply: el => el.style.fontStyle = 'italic' },
  { name: 'typewriter', isNew: true, apply: el => el._typewriter = true },
];

/* ── STATE ── */
let activeBasic = new Set();

/* ── BUILD EFFECT BUTTONS ── */
function buildEffGrid(effects, containerId) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';

  effects.forEach((eff, i) => {
    const btn = document.createElement('button');
    btn.className = 'eff-btn';

    // SIMPLE + SAFE innerHTML 
    btn.innerHTML = `
      ${eff.name}
      ${eff.isNew ? '<span class="new-tag">NEW</span>' : ''}
    `;

    btn.onclick = () => {
      if (activeBasic.has(i)) {
        activeBasic.delete(i);
        btn.classList.remove('active');
      } else {
        activeBasic.add(i);
        btn.classList.add('active');
      }
      renderPreview();
    };

    grid.appendChild(btn);
  });
}

/* ── TYPEWRITER ── */
function buildTypewriterEffect(el, text) {
  if (el._typewriterInit) return;
  el._typewriterInit = true;

  let i = 0;
  let running = false;

  function type() {
    if (!running) return;

    if (i <= text.length) {
      el.textContent = text.slice(0, i) + (i < text.length ? '|' : '');
      i++;
      setTimeout(type, 70);
    } else {
      el.textContent = text;
      running = false;
    }
  }

  function start() {
    i = 0;
    running = true;
    type();
  }

  el.addEventListener('mouseenter', start);
  start();
}

/* ── APPLY EFFECTS ── */
function applyEffects(el, text) {
  el.textContent = text;
  el._typewriter = false;

  activeBasic.forEach(i => {
    const eff = basicEffects[i];
    if (eff) eff.apply(el);
  });

  // FINAL PASS ONLY
  if (el._typewriter) buildTypewriterEffect(el, text);
}

/* ── PREVIEW ── */
function renderPreview() {
  const word = document.getElementById('word-input').value || 'your word';
  const el = document.getElementById('preview-word');

  el.style.fontSize = '2rem';
  applyEffects(el, word);
}

/* ── INIT ── */
buildEffGrid(basicEffects, 'basic-grid');

document.getElementById('word-input')
  .addEventListener('input', renderPreview);

renderPreview();
</script>
</body>
</html>
